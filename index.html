<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noimageindex">
<title>sketchbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/* === Reset === */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #fff;
  color: #111;
  font-family: 'Space Grotesk', sans-serif;
  -webkit-font-smoothing: antialiased;
  font-size: 16px;
}

/* === Header === */
.site-header {
  padding: 40px 40px 0;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.site-title {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.06em;
  text-transform: lowercase;
  color: #111;
}

.site-subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 400;
  color: #aaa;
  letter-spacing: 0.03em;
}

/* === Main flow === */
.flow {
  padding: 40px;
}

/* === Grid === */
.grid {
  column-count: 4;
  column-gap: 20px;
}

.grid-item {
  break-inside: avoid;
  margin-bottom: 20px;
  cursor: pointer;
  position: relative;
}

.grid-item img {
  width: 100%;
  display: block;
  pointer-events: none;
}

.grid-item:hover img {
  opacity: 0.88;
  transition: opacity 0.2s ease;
}

/* === Text block in grid === */
.grid-item.text-block {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  min-height: 180px;
  cursor: default;
}

.grid-item.text-block .text-content {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  line-height: 1.65;
  color: #333;
  white-space: pre-line;
  text-align: left;
}

/* === Expanded view === */
.expanded-section {
  width: 100vw;
  margin-left: -40px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 60px 40px;
  animation: fadeIn 0.35s ease;
}

.expanded-section .close-btn {
  position: absolute;
  top: 20px;
  right: 28px;
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  background: none;
  border: none;
  color: #bbb;
  cursor: pointer;
  padding: 8px;
  line-height: 1;
  z-index: 10;
}
.expanded-section .close-btn:hover { color: #333; }

.expanded-section .nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 22px;
  background: none;
  border: none;
  color: #ccc;
  cursor: pointer;
  padding: 16px;
  z-index: 10;
  transition: color 0.15s;
}
.expanded-section .nav-arrow:hover { color: #333; }
.expanded-section .nav-arrow:disabled { opacity: 0; cursor: default; }
.expanded-section .nav-arrow[data-dir="prev"] { left: 8px; }
.expanded-section .nav-arrow[data-dir="next"] { right: 8px; }

.img-stage {
  position: relative;
  max-width: min(88vw, 1400px);
  max-height: 85vh;
  cursor: zoom-in;
}
.img-stage.enlarged {
  max-height: none;
  cursor: zoom-out;
}
.img-stage img {
  max-width: min(88vw, 1400px);
  max-height: 85vh;
  object-fit: contain;
  display: block;
  pointer-events: none;
}
.img-stage.enlarged img {
  max-height: none;
}
.img-stage .img-back {
  position: absolute;
  top: 0;
  left: 0;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.img-stage .img-back.visible {
  opacity: 1;
}

/* === Expanded text block === */
.expanded-section.text-expanded {
  min-height: 80vh;
}
.expanded-section.text-expanded .text-content-expanded {
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  line-height: 1.7;
  color: #222;
  max-width: 640px;
  white-space: pre-line;
  text-align: left;
}

/* === Footer === */
.site-footer {
  padding: 60px 40px 40px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.site-footer span {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: #ccc;
  letter-spacing: 0.03em;
}
.site-footer a {
  color: #ccc;
  text-decoration: none;
}
.site-footer a:hover { color: #888; }

/* === Animation === */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* === Copy protection === */
img {
  -webkit-user-drag: none;
  user-select: none;
}

/* ===================== */
/* === RESPONSIVE ====== */
/* ===================== */

/* 6 columns — ultrawide */
@media (min-width: 2200px) { .grid { column-count: 6; } }

/* 5 columns */
@media (min-width: 1800px) and (max-width: 2199px) { .grid { column-count: 5; } }

/* 4 columns — default above */

/* 3 columns */
@media (max-width: 1400px) { .grid { column-count: 3; } }

/* 2 columns — tablet landscape: simple feed, no interaction */
@media (max-width: 1100px) {
  .grid { column-count: 2; column-gap: 16px; }
  .grid-item { margin-bottom: 16px; cursor: default; }
  .grid-item img { pointer-events: none; }
  .flow { padding: 24px; }
  .site-header { padding: 24px 24px 0; }
  .site-footer { padding: 40px 24px 24px; }
}

/* 1 column — mobile: pure feed */
@media (max-width: 640px) {
  .grid { column-count: 1; column-gap: 0; }
  .grid-item { margin-bottom: 12px; cursor: default; }
  .grid-item.text-block { padding: 24px 16px; min-height: 120px; }
  .grid-item.text-block .text-content { font-size: 15px; }
  .flow { padding: 12px; }
  .site-header { padding: 16px 12px 0; }
  .site-footer { padding: 32px 12px 16px; }
}

</style>
</head>

const isMobile = window.innerWidth <= 1100;
let expandedId = null;
let isEnlarged = false;

function getIdx() {
  return items.findIndex(i => i.id === expandedId);
}

function closeExpanded() {
  expandedId = null;
  isEnlarged = false;
  history.replaceState(null, '', window.location.pathname);
  render();
  // scroll back to the item in grid
  requestAnimationFrame(() => {
    const hash = expandedId;
    // find closest grid item
  });
}

function navigateArrow(newId) {
  const stage = document.getElementById('img-stage');
  if (!stage) { expandedId = newId; history.replaceState(null, '', '#' + newId); render(); return; }

  const item = items.find(i => i.id === newId);
  if (!item || item.type !== 'image') { expandedId = newId; history.replaceState(null, '', '#' + newId); render(); return; }

  const front = document.getElementById('img-front');
  const back = document.getElementById('img-back');

  back.src = item.full;
  back.onload = () => {
    back.classList.add('visible');
    setTimeout(() => {
      expandedId = newId;
      isEnlarged = false;
      history.replaceState(null, '', '#' + newId);
      render();
    }, 300);
  };
}

function preloadNeighbors(idx) {
  [-1, 1].forEach(d => {
    const n = items[idx + d];
    if (n && n.type === 'image') { const img = new Image(); img.src = n.full; }
  });
}

function rebindArrows(idx) {
  document.querySelectorAll('.nav-arrow').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const dir = btn.dataset.dir;
      const next = dir === 'prev' ? idx - 1 : idx + 1;
      if (next >= 0 && next < items.length) navigateArrow(items[next].id);
    };
  });
}

function render() {
  const flow = document.getElementById('flow');
  flow.innerHTML = '';

  if (expandedId && !isMobile) {
    const idx = getIdx();
    const item = items[idx];
    const hasPrev = idx > 0;
    const hasNext = idx < items.length - 1;

    // Grid before
    const gridBefore = document.createElement('div');
    gridBefore.className = 'grid';
    items.slice(0, idx).forEach(i => gridBefore.appendChild(makeGridItem(i)));
    flow.appendChild(gridBefore);

    // Expanded section
    const el = document.createElement('div');
    el.className = 'expanded-section' + (item.type === 'text' ? ' text-expanded' : '');
    el.id = item.id;

    if (item.type === 'image') {
      el.innerHTML = `
        <button class="close-btn">&times;</button>
        <button class="nav-arrow" ${!hasPrev ? 'disabled' : ''} data-dir="prev">&#8592;</button>
        <div class="img-stage" id="img-stage">
          <img id="img-front" src="${item.full}" alt="${item.id}">
          <img id="img-back" class="img-back" src="" alt="">
        </div>
        <button class="nav-arrow" ${!hasNext ? 'disabled' : ''} data-dir="next">&#8594;</button>
      `;
    } else {
      el.innerHTML = `
        <button class="close-btn">&times;</button>
        <button class="nav-arrow" ${!hasPrev ? 'disabled' : ''} data-dir="prev">&#8592;</button>
        <div class="text-content-expanded">${item.text}</div>
        <button class="nav-arrow" ${!hasNext ? 'disabled' : ''} data-dir="next">&#8594;</button>
      `;
    }

    flow.appendChild(el);
    el.querySelector('.close-btn').addEventListener('click', (e) => { e.stopPropagation(); closeExpanded(); });
    rebindArrows(idx);

    if (item.type === 'image') {
      const stage = el.querySelector('#img-stage');
      stage.addEventListener('click', (e) => {
        e.stopPropagation();
        isEnlarged = !isEnlarged;
        stage.classList.toggle('enlarged', isEnlarged);
      });
      preloadNeighbors(idx);
    }

    // Grid after
    const gridAfter = document.createElement('div');
    gridAfter.className = 'grid';
    items.slice(idx + 1).forEach(i => gridAfter.appendChild(makeGridItem(i)));
    flow.appendChild(gridAfter);

  } else {
    // Simple grid (mobile or no expanded)
    const grid = document.createElement('div');
    grid.className = 'grid';
    items.forEach(i => grid.appendChild(makeGridItem(i)));
    flow.appendChild(grid);
  }
}

function makeGridItem(item) {
  const div = document.createElement('div');
  div.className = 'grid-item' + (item.type === 'text' ? ' text-block' : '');
  div.id = 'grid-' + item.id;

  if (item.type === 'image') {
    const src = isMobile ? item.full : item.thumb;
    div.innerHTML = `<img src="${src}" alt="${item.id}" loading="lazy">`;
    if (!isMobile) {
      div.addEventListener('click', () => {
        expandedId = item.id;
        history.replaceState(null, '', '#' + item.id);
        render();
        requestAnimationFrame(() => {
          const el = document.getElementById(item.id);
          if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
        });
      });
    }
  } else {
    div.innerHTML = `<div class="text-content">${item.text}</div>`;
    if (!isMobile) {
      div.addEventListener('click', () => {
        expandedId = item.id;
        history.replaceState(null, '', '#' + item.id);
        render();
        requestAnimationFrame(() => {
          const el = document.getElementById(item.id);
          if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
        });
      });
    }
  }

  return div;
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (!expandedId) return;
  const idx = getIdx();
  if (e.key === 'Escape') {
    if (isEnlarged) {
      isEnlarged = false;
      const s = document.getElementById('img-stage');
      if (s) s.classList.remove('enlarged');
    } else {
      closeExpanded();
    }
  } else if (e.key === 'ArrowLeft' && idx > 0) {
    navigateArrow(items[idx - 1].id);
  } else if (e.key === 'ArrowRight' && idx < items.length - 1) {
    navigateArrow(items[idx + 1].id);
  }
});

// Copy protection
document.addEventListener('contextmenu', (e) => {
  if (e.target.tagName === 'IMG') e.preventDefault();
});
document.addEventListener('dragstart', (e) => {
  if (e.target.tagName === 'IMG') e.preventDefault();
});

// Hash navigation on load
const hash = window.location.hash.slice(1);
if (hash) {
  const item = items.find(i => i.id === hash);
  if (item) expandedId = item.id;
}

render();

if (expandedId) {
  requestAnimationFrame(() => {
    const el = document.getElementById(expandedId);
    if (el) el.scrollIntoView({ block: 'start' });
  });
}

</script>
